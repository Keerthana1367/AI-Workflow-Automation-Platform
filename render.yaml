services:
  # 1. AI Backend (FastAPI)
  - type: web
    name: ai-workflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0

  # 2. AI Frontend (Streamlit)
  - type: web
    name: ai-workflow-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          name: ai-workflow-backend
          type: web
          property: host
      - key: PYTHON_VERSION
        value: 3.11.0
