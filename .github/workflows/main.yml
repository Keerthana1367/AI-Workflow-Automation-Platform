name: AI Workflow Platform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      # We skip actual Gemini calls in tests using mocks
      run: |
        pytest tests/
        
  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      run: echo "Skipping actual login for demo. Use secrets.DOCKER_PASSWORD in production."
      
    - name: Build Docker Image
      run: |
        docker build -t ai-workflow-platform:latest .
        
    - name: Push to Registry (Simulation)
      run: |
        echo "Pushing image to registry..."
